# Regenerates the Danish SKS FHIR CodeSystems from the upstream SKScomplete.txt
# and opens a PR when the SKS content has actually changed.
#
# Sundhedsdatastyrelsen revises SKS quarterly: the new version is live on the
# 1st of January / April / July / October, announced ~the 17th of the preceding
# month. See scripts/SKS-UPDATES.md and:
# https://sundhedsdatastyrelsen.dk/indberetning/klassifikationer/sks-klassifikationer/opdateringer
#
# After a PR merges, the updated CodeSystems in fhir/ must be uploaded to the
# Nordic terminology server (manual step) so the DK Core IG can resolve them.
# The ICPC-2 -> ICD-10 ConceptMap is generated manually (licensing) and is not
# part of this workflow.

name: Update SKS CodeSystems

on:
  schedule:
    # Just after each quarter change (new version is live on the 1st).
    - cron: "0 6 1 1,4,7,10 *"
    # Day after the ~17th announcement, in case files are published early.
    - cron: "0 6 18 3,6,9,12 *"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version label override (default: the SKS source revision date from Last-Modified, e.g. 2026-03-16)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SKS CodeSystems
        id: ver
        run: |
          # By default the script stamps version/date from the SKScomplete
          # Last-Modified header (the authoritative quarterly revision date).
          # A manual dispatch may override it with an explicit label.
          ver_arg=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ver_arg="--sks-version ${{ github.event.inputs.version }} --supplement-version ${{ github.event.inputs.version }}"
          fi
          python3 scripts/sks_icd10_diff.py --force-download \
            --out-dir sks-icd10-out $ver_arg
          version=$(jq -r .version sks-icd10-out/CodeSystem-sks.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Generated SKS revision: $version"

      - name: Detect real content changes
        id: diff
        run: |
          changed=false
          for f in CodeSystem-sks.json CodeSystem-sks-icd10-deviations.json CodeSystem-icd10-da.json; do
            new="sks-icd10-out/$f"
            old="fhir/$f"
            # Ignore version/date/meta stamps — only concept content matters.
            filter='del(.version, .date, .meta)'
            new_hash=$(jq -S "$filter" "$new" | sha256sum | cut -d" " -f1)
            if [ -f "$old" ]; then
              old_hash=$(jq -S "$filter" "$old" | sha256sum | cut -d" " -f1)
            else
              old_hash="missing"
            fi
            if [ "$new_hash" != "$old_hash" ]; then
              echo "Content changed: $f ($old_hash -> $new_hash)"
              cp "$new" "$old"
              changed=true
            else
              echo "No content change: $f"
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sks-update-${{ steps.ver.outputs.version }}
          base: main
          commit-message: "Update SKS CodeSystems to revision ${{ steps.ver.outputs.version }}"
          title: "Update SKS CodeSystems to revision ${{ steps.ver.outputs.version }}"
          body: |
            Automated regeneration of the Danish SKS FHIR CodeSystems from the
            upstream [`SKScomplete.txt`](https://filer.sundhedsdata.dk/sks/data/skscomplete/SKScomplete.txt).

            - SKS source revision (file `Last-Modified`): `${{ steps.ver.outputs.version }}`
            - Generated by `scripts/sks_icd10_diff.py` (see `scripts/README.md`)
            - SKS update cadence: `scripts/SKS-UPDATES.md`

            The SKS content changed since the committed snapshot. Review the diff
            (new/closed codes, validity, hierarchy) before merging.

            **After merge:** upload the updated `fhir/` CodeSystems to the Nordic
            terminology server so the DK Core IG can resolve them.
          labels: |
            terminology
            automated
          add-paths: |
            fhir/CodeSystem-sks.json
            fhir/CodeSystem-sks-icd10-deviations.json
            fhir/CodeSystem-icd10-da.json

      - name: Report no change
        if: steps.diff.outputs.changed != 'true'
        run: echo "SKS content unchanged — no pull request opened."
